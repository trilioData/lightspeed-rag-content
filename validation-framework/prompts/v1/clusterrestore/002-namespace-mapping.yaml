id: clusterrestore-namespace-mapping
category: clusterrestore
validation_mode: rubric
prompt: How do I restore a ClusterBackup to different namespaces than the original?
expected_facts:
- Use the spec.components list on the ClusterRestore CR to map source namespaces to target namespaces
- Each entry in spec.components has a backupNamespace field that identifies the source namespace in the ClusterBackup
- Each entry in spec.components has a restoreNamespace field that identifies the namespace to restore into on the target cluster
- spec.source still selects the ClusterBackup (or ClusterSnapshot) being restored; namespace remapping happens through spec.components
expected_citations:
- tvk-content/CRDs/clusterrestore-crd.md
tags:
- configuration
- namespace-mapping
- disaster-recovery
