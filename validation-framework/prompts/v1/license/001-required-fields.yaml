id: license-required-fields
category: license
validation_mode: rubric
prompt: What are the required fields to create a License CR?
expected_facts:
- The CRD kind is License with apiVersion triliovault.trilio.io/v1
- The License CR must be created in the Trilio installation namespace (e.g. tvk, trilio-system)
- The recommended approach is to reference a Kubernetes Secret containing the license key via spec.secretRef.name and spec.secretRef.namespace
- The referenced Secret must contain the license content under the key 'trilioLicense'
- Trilio maintains only one License instance per Trilio for Kubernetes installation; applying a new license file replaces the previous one
expected_citations:
- tvk-content/CRDs/license-crd.md
tags:
- cr-api
- required-fields
