                type: boolean
              expirationTimestamp:
                description: ExpirationTimeStamp is the time a backup will not be
                  available after retention.
                format: date-time
                type: string
              hasKubevirtResources:
                description: HasKubevirtResources flag will be true if backup contains
                  any kubevirt resources (VirtualMachine etc)
                type: boolean
              hookStatus:
                description: HookStatus specifies pre/post hook execution status for
