                                RetryCount count used to retry hook execution within the time range specified by Timeout.
                                This is the actual number of times backup controller retried for pre/post hook execution if MaxRetryCount>0.
                                Default is 0
                              maximum: 10
                              minimum: 0
                              type: integer
                            status:
                              description: Status is the status for pre/post hook
                                execution
                              enum:
                              - InProgress
                              - Completed
                              - Failed
                              type: string
                          type: object
                        preHookStatus:
                          description: PreHookStatus defines status for pre hooks
                          properties:
                            exitStatus:
                              description: ExitStatus contains returned exit code
                                and error trace after pre/post hook execution
                              type: string
                            retryCount:
                              description: |-
                                RetryCount count used to retry hook execution within the time range specified by Timeout.
                                This is the actual number of times backup controller retried for pre/post hook execution if MaxRetryCount>0.
                                Default is 0
                              maximum: 10
                              minimum: 0
                              type: integer
                            status:
                              description: Status is the status for pre/post hook
                                execution
                              enum:
                              - InProgress
                              - Completed
                              - Failed
                              type: string
                          type: object
                      required:
                      - object
                      type: object
                    type: array
                  hookPriorityStatus:
                    description: HookPriorityStatuses specifies pre/post hook execution
