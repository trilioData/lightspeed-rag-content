                                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                                      referencing a part of an object.
                                    type: string
                                  kind:
                                    description: |-
                                      Kind of the referent.
                                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                                    type: string
                                  name:
                                    description: |-
                                      Name of the referent.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  namespace:
                                    description: |-
                                      Namespace of the referent.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                                    type: string
                                  resourceVersion:
                                    description: |-
                                      Specific resourceVersion to which this reference is made, if any.
                                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                                    type: string
                                  uid:
                                    description: |-
                                      UID of the referent.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                                    type: string
                                type: object
                                x-kubernetes-map-type: atomic
                              hookTarget:
                                description: HookTarget defines targeting hook resources.
                                items:
                                  properties:
                                    containerRegex:
                                      description: ContainerRegex identifies containers
                                        in identified pods to execute hooks.
                                      type: string
                                    owner:
                                      description: |-
                                        Owner specifies the parent for identified pods in PodHookStatus.
                                        backup controller will fetch pods from Owner to execute the hooks.
                                        Owner will be nil for pods with no owner.
                                      properties:
                                        groupVersionKind:
                                          description: GroupVersionKind specifies
                                            GVK uniquely representing particular owner
                                            type.
                                          properties:
                                            group:
                                              type: string
                                            kind:
                                              type: string
                                            version:
                                              type: string
                                          type: object
                                        name:
                                          description: Name is name of owner
                                          type: string
                                      required:
                                      - groupVersionKind
                                      - name
                                      type: object
                                    podHookStatus:
                                      description: PodHookStatus specifies pre/post
                                        hook execution status for current backup.
                                      items:
                                        description: PodHookStatus defines observed
                                          state for hooks
                                        properties:
                                          containerHookStatus:
                                            description: |-
                                              ContainerHookStatus defines status for filtered containers in a pod named 'PodName'
                                              One Container can have multiple hook executions.
                                            items:
                                              description: ContainerHookStatus defines
                                                hook execution status for a containers
                                              properties:
                                                containerName:
                                                  description: ContainerName is container
                                                    in which hooks are executed.
                                                  type: string
                                                postHookStatus:
                                                  description: PostHookStatus defines
                                                    status for post hooks
                                                  properties:
                                                    exitStatus:
                                                      description: ExitStatus contains
                                                        returned exit code and error
                                                        trace after pre/post hook
                                                        execution
                                                      type: string
                                                    retryCount:
                                                      description: |-
                                                        RetryCount count used to retry hook execution within the time range specified by Timeout.
                                                        This is the actual number of times backup controller retried for pre/post hook execution if MaxRetryCount>0.
                                                        Default is 0
                                                      maximum: 10
                                                      minimum: 0
                                                      type: integer
                                                    status:
                                                      description: Status is the status
                                                        for pre/post hook execution
                                                      enum:
                                                      - InProgress
                                                      - Completed
                                                      - Failed
                                                      type: string
                                                  type: object
                                                preHookStatus:
                                                  description: PreHookStatus defines
                                                    status for pre hooks
                                                  properties:
                                                    exitStatus:
                                                      description: ExitStatus contains
                                                        returned exit code and error
                                                        trace after pre/post hook
                                                        execution
                                                      type: string
                                                    retryCount:
                                                      description: |-
                                                        RetryCount count used to retry hook execution within the time range specified by Timeout.
                                                        This is the actual number of times backup controller retried for pre/post hook execution if MaxRetryCount>0.
                                                        Default is 0
                                                      maximum: 10
                                                      minimum: 0
                                                      type: integer
                                                    status:
                                                      description: Status is the status
                                                        for pre/post hook execution
                                                      enum:
                                                      - InProgress
                                                      - Completed
                                                      - Failed
                                                      type: string
                                                  type: object
                                              required:
                                              - containerName
                                              type: object
                                            minItems: 1
                                            type: array
                                          podName:
                                            description: PodName is the single pod
                                              name from identified sets of pods filtered
                                              for hook config.
                                            type: string
                                        required:
                                        - containerHookStatus
                                        - podName
                                        type: object
                                      type: array
                                  type: object
                                type: array
                              postHookConf:
                                description: PostHookConf defines how post hook implementation
                                  will be handled
                                properties:
                                  ignoreFailure:
                                    description: |-
                                      IgnoreFailure is a boolean, if set to true all the failures will be ignored for
                                      both in pre and post hooks
                                      Default is false.
                                    type: boolean
                                  maxRetryCount:
                                    description: |-
                                      MaxRetryCount is the maximum number of times pre/post hook execution can be retried.
                                      MaxRetryCount will be equal to the RetryCount specified in Hook Spec.
                                    maximum: 10
                                    minimum: 0
                                    type: integer
                                  timeoutSeconds:
                                    description: |-
                                      TimeoutSeconds is A Maximum allowed time in seconds to execute Hook.
                                      timeout here is a hard timeout.
                                      Meaning the command needs to exit in that time, either with exit code 0 or non 0.
                                      hook execution will be considered in error if it fails to complete within timeout.
                                    maximum: 300
                                    minimum: 1
                                    type: integer
                                type: object
                              preHookConf:
                                description: PreHookConf defines how pre hook implementation
                                  will be handled
                                properties:
                                  ignoreFailure:
                                    description: |-
                                      IgnoreFailure is a boolean, if set to true all the failures will be ignored for
                                      both in pre and post hooks
                                      Default is false.
                                    type: boolean
                                  maxRetryCount:
                                    description: |-
                                      MaxRetryCount is the maximum number of times pre/post hook execution can be retried.
                                      MaxRetryCount will be equal to the RetryCount specified in Hook Spec.
                                    maximum: 10
                                    minimum: 0
                                    type: integer
                                  timeoutSeconds:
                                    description: |-
                                      TimeoutSeconds is A Maximum allowed time in seconds to execute Hook.
                                      timeout here is a hard timeout.
                                      Meaning the command needs to exit in that time, either with exit code 0 or non 0.
                                      hook execution will be considered in error if it fails to complete within timeout.
                                    maximum: 300
                                    minimum: 1
                                    type: integer
                                type: object
                            required:
                            - hook
                            - postHookConf
                            - preHookConf
                            type: object
                          minItems: 1
                          type: array
                        priority:
                          description: |-
                            Priority defines priority for hooks.
                            backup controller will use `Priority` to determine sequence of hook execution.
                            In case of parallel Mode, priority will be same for all,
                            in case of sequential Mode, priority will be same for a group and not individual HookConfig Set.
                            Default Priority is 0.
                          minimum: 0
                          type: integer
                      required:
                      - hooks
                      - priority
                      type: object
                    type: array
                  podReadyWaitSeconds:
                    description: |-
                      PodReadyWaitSeconds is the wait time for which hook execution waits before performing hook Quiescing/UnQuiescing
                      It is only applicable for  pods which are found in NotRunning state during hook execution
                      Default value is 120s, that will be set by webhook.
                    maximum: 600
                    minimum: 1
                    type: integer
                type: object
              location:
                description: Location is the absolute path of the target where backup
                  resides.
                type: string
              metadataSize:
                anyOf:
                - type: integer
                - type: string
                description: MetadataSize is the size of the metadata backed up.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              percentageCompletion:
                description: PercentageCompletion is the amount of backup operation
                  completed.
                maximum: 100
                minimum: 0
                type: integer
              phase:
                description: Phase is the current phase of the backup operation.
                type: string
              phaseStatus:
                description: PhaseStatus is the status of phase backup operation going
                  through.
                enum:
                - InProgress
                - Pending
                - Error
                - Completed
                - Failed
                type: string
              scope:
                description: Scope indicates scope of a component in Backup/Snapshot
                  i.e., App or Namespace.
                enum:
                - App
                - Namespace
                type: string
              securityScanStatus:
                additionalProperties:
                  properties:
                    scanInstances:
                      additionalProperties:
                        description: ScanInstance specifies the info about Security
                          ScanInstance and its related report summary
                        properties:
                          backupScanInfo:
                            additionalProperties:
                              properties:
                                dataScannerStatus:
                                  additionalProperties:
                                    properties:
                                      reportSummary:
                                        description: ReportSummary is the summary
                                          of vulnerabilities detected in the Security
                                          scanning
                                        properties:
                                          critical:
                                            type: integer
                                          high:
                                            type: integer
                                          low:
                                            type: integer
                                          medium:
                                            type: integer
                                          total:
                                            type: integer
                                        type: object
                                      scansPassed:
                                        description: ScansPassed denotes the number
                                          of scans passed out of TotalScans
                                        type: integer
                                      status:
                                        description: Status is the status of the condition.
                                        enum:
                                        - Completed
                                        - Failed
                                        type: string
                                      totalScans:
                                        description: TotalScans denotes the total
                                          number of scans done for each type
                                        type: integer
                                    required:
                                    - reportSummary
                                    type: object
                                  description: |-
                                    DataScannerStatus is the result of Data Scanning
                                    It is the mapping of  scanner name and its corresponding report
                                  type: object
                                imageScannerStatus:
                                  additionalProperties:
                                    properties:
                                      reportSummary:
                                        description: ReportSummary is the summary
                                          of vulnerabilities detected in the Security
                                          scanning
                                        properties:
                                          critical:
                                            type: integer
                                          high:
                                            type: integer
                                          low:
                                            type: integer
                                          medium:
                                            type: integer
                                          total:
                                            type: integer
                                        type: object
                                      scansPassed:
                                        description: ScansPassed denotes the number
                                          of scans passed out of TotalScans
                                        type: integer
                                      status:
                                        description: Status is the status of the condition.
                                        enum:
                                        - Completed
                                        - Failed
                                        type: string
                                      totalScans:
                                        description: TotalScans denotes the total
                                          number of scans done for each type
                                        type: integer
                                    required:
                                    - reportSummary
                                    type: object
                                  description: |-
                                    ImageScannerStatus is the result of Image Scanning
                                    It is the mapping of  scanner name and its corresponding report
                                  type: object
                                metadataScannerStatus:
                                  additionalProperties:
                                    properties:
                                      reportSummary:
                                        description: ReportSummary is the summary
                                          of vulnerabilities detected in the Security
                                          scanning
                                        properties:
                                          critical:
                                            type: integer
                                          high:
                                            type: integer
                                          low:
                                            type: integer
                                          medium:
                                            type: integer
                                          total:
                                            type: integer
                                        type: object
                                      scansPassed:
                                        description: ScansPassed denotes the number
                                          of scans passed out of TotalScans
                                        type: integer
                                      status:
                                        description: Status is the status of the condition.
                                        enum:
                                        - Completed
                                        - Failed
                                        type: string
                                      totalScans:
                                        description: TotalScans denotes the total
                                          number of scans done for each type
                                        type: integer
                                    required:
                                    - reportSummary
                                    type: object
                                  description: |-
                                    MetadataScannerStatus is the result of Metadata Scanning
                                    It is the mapping of  scanner name and its corresponding report
                                  type: object
                              type: object
                            description: |-
                              BackupScanInfo defines the scanning report for Backup or each Backup of a ClusterBackup
                              It is the mapping of Backup-uuid and corresponding Scanning report
                            type: object
                          reportPath:
                            description: ReportPath is the location of Scanning report
                              on the target
                            type: string
                          scanInstanceName:
                            description: ScanInstanceName is the name of the ScanInstance
                              triggered on the Security site
                            type: string
                          scanTimestamp:
                            description: ScanTimestamp is the time stamp when scanning
                              completed/failed
                            format: date-time
                            type: string
                        required:
                        - backupScanInfo
                        - scanInstanceName
                        type: object
                      description: |-
                        ScanInstances defines the list of latest 3 Security ScanInstances which were triggered for a
                        Backup/ClusterBackup Security scanning
                      type: object
                  required:
                  - scanInstances
                  type: object
                description: SecurityScanStatus contains the information of Security
                  Scan performed for Backup on each Security instanceID defined.
                type: object
              size:
                anyOf:
                - type: integer
                - type: string
                description: Size is the aggregate size of metadata and data backed
                  up
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              snapshot:
                description: |-
                  Todo: Do we need this option as optional one?
                  Todo: This is optional because, we are allowing the custom backup as empty
                  Snapshot specifies the contents of captured backup.
                properties:
                  custom:
                    description: Custom specifies the snapshot of Custom defined applications.
                    properties:
                      dataSnapshots:
                        description: DataSnapshot specifies the Snapshot of the Volumes
                          resources in the Custom defined application.
                        items:
                          description: DataSnapshot defines Snapshot of a Persistent
                            Volume
                          properties:
                            backupType:
                              description: BackupType is the type of Volume backup
                                in the sequence of backups.
                              enum:
