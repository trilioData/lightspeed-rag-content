  name: backups.triliovault.trilio.io
spec:
  group: triliovault.trilio.io
  names:
    kind: Backup
    listKind: BackupList
    plural: backups
    singular: backup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backupPlan.name
