                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              type:
                description: Type is the type of backup in the sequence of backups
                  of an Application.
                enum:
                - Incremental
                - Full
                - Mixed
                type: string
            required:
            - backupPlan
            - type
            type: object
          status:
            description: BackupStatus defines the observed state of Backup and Snapshot
            properties:
              applicationType:
                description: ApplicationType is the type of Application backed up
                  in the App Scoped backup.
                enum:
                - Helm
                - Operator
                - Custom
                - Namespace
                - MultiNamespace
                type: string
              backupScope:
                description: |-
                  BackupScope indicates scope of component in backup i.e. App or Namespace.

                  Deprecated: Use Scope instead.
                enum:
                - App
                - Namespace
                type: string
              coalesceInfo:
                description: CoalesceInfo contains the information of retention operation
                  performed for backup
                properties:
                  errorMessages:
                    items:
                      type: string
                    type: array
                  retentionFailureStatus:
                    additionalProperties:
                      additionalProperties:
                        type: string
                      type: object
                    description: |-
                      RetentionFailureStatus points which backup and PVC failed in retention and it which stage.
                      map[backupName]map[pvcName]value where valid values are:
                    type: object
                  retryCount:
                    type: integer
                  state:
                    description: nolint:lll // too long line
                    enum:
                    - CommitStarted
                    - CommitCompleted
                    - CommitFailed
                    - Qcow2MovementStarted
                    - Qcow2MovementCompleted
                    - Qcow2MovementFailed
                    type: string
                type: object
              completionTimestamp:
                description: CompletionTimestamp is the time a backup was finished.
                format: date-time
                type: string
              condition:
                description: Condition is the current condition of hooks while backup.
                items:
                  description: BackupCondition specifies the current condition of
                    a backup resource.
                  properties:
                    phase:
                      description: Phase defines the current phase of the controller.
                      enum:
                      - PreBackupValidation
                      - Unquiesce
                      - Quiesce
                      - MetaSnapshot
                      - DataSnapshot
                      - DataUpload
                      - Snapshot
                      - MetadataUpload
                      - Retention
                      - Upload
                      - ImageBackup
                      - HookTargetIdentification
                      - Cleanup
                      - Cancel
                      type: string
                    reason:
                      description: A brief message indicating details about why the
                        component is in this condition.
                      type: string
                    status:
                      description: Status is the status of the condition.
                      enum:
                      - InProgress
                      - Error
                      - Completed
                      - Failed
                      - Skipped
                      - Canceled
                      type: string
                    timestamp:
                      description: Timestamp is the time a condition occurred.
                      format: date-time
                      type: string
                  type: object
                type: array
              consistentSetStatus:
                additionalProperties:
                  properties:
                    consistentSetCompletionTimeStamp:
                      description: ConsistentSetCompletionTimeStamp is the completion
                        timestamp of ConsistentSet
                      format: date-time
                      type: string
                    consistentSetCreationTimeStamp:
                      description: ConsistentSetCreationTimeStamp is the creation
                        timestamp of ConsistentSet
                      format: date-time
                      type: string
                    consistentSetName:
                      description: ConsistentSetName is the name of ConsistentSet
                        created for ContinuousRestore corresponding to the Backup/ClusterBackup
                      type: string
                    consistentSetStatus:
                      description: ConsistentSetStatus is the current Status of ConsistentSet.
                      enum:
                      - Available
                      - InProgress
                      - Unavailable
                      - Failed
                      - InUse
                      - Queued
                      type: string
                    consistentSetUID:
                      description: ScanInstanceUID is the UID of the ConsistentSet
                        created for ContinuousRestore corresponding to the Backup/ClusterBackup
                      type: string
                    size:
                      anyOf:
                      - type: integer
                      - type: string
                      description: TotalSize is the aggregate size of the data restored
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                  required:
                  - consistentSetName
                  - consistentSetUID
                  type: object
                description: |-
                  ConsistentSetStatus contains the mapping of instanceID and the ContinuousRestore performed
                  for Backup on that ContinuousRestore site instance.
                type: object
              duration:
                description: Duration is the amount of time the backup process took
